<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CMM Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0e0a;--bg2:#0f1510;--bg3:#141e14;--green:#00ff41;--green2:#00cc33;--green3:#004d14;--amber:#ffb300;--text:#c8ffc8;--text2:#7ab87a;--border:rgba(0,255,65,0.2)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{position:relative;z-index:2;background:rgba(0,0,0,0.8);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo-box{width:40px;height:40px;border:2px solid var(--green);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:20px}
.header-title{font-family:'Share Tech Mono',monospace;font-size:16px;color:var(--green);letter-spacing:2px;text-shadow:0 0 10px var(--green)}
.header-sub{font-size:11px;color:var(--text2);letter-spacing:1px}
.status-dot{width:8px;height:8px;background:var(--green);border-radius:50%;margin-left:auto;box-shadow:0 0 8px var(--green);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.topics{position:relative;z-index:2;display:flex;gap:6px;padding:8px 16px;background:rgba(0,0,0,0.5);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.topic-btn{background:rgba(0,255,65,0.05);border:1px solid var(--border);color:var(--text2);padding:5px 12px;border-radius:3px;font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer;white-space:nowrap;transition:all 0.2s}
.topic-btn.active{background:rgba(0,255,65,0.15);border-color:var(--green);color:var(--green)}
#chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;position:relative;z-index:2;min-height:0}
.msg{display:flex;gap:10px;animation:fadeIn 0.3s ease}
.msg.user{flex-direction:row-reverse}
.msg-avatar{width:32px;height:32px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;border:1px solid var(--border)}
.msg.bot .msg-avatar{background:var(--green3);border-color:var(--green)}
.msg-content{max-width:85%}
.msg-label{font-family:'Share Tech Mono',monospace;font-size:10px;margin-bottom:4px}
.msg-bubble{padding:10px 14px;border-radius:4px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word;background:rgba(0,255,65,0.05);border:1px solid var(--border)}
.msg.user .msg-bubble{border-right:3px solid var(--amber);background:rgba(255,179,0,0.08)}
#input-area{background:rgba(0,0,0,0.8);border-top:1px solid var(--border);padding:12px 16px;flex-shrink:0}
.input-row{display:flex;gap:8px;align-items:flex-end}
#msg-input{flex:1;background:rgba(0,255,65,0.05);border:1px solid var(--border);border-radius:4px;padding:10px 14px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;outline:none;resize:none;min-height:44px;max-height:120px}
#send-btn{width:44px;height:44px;background:var(--green3);border:1px solid var(--green);border-radius:4px;color:var(--green);cursor:pointer}
.welcome-box{background:rgba(0,255,65,0.03);border:1px solid var(--border);padding:20px;border-radius:4px}
.welcome-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}
.welcome-item{background:rgba(0,255,65,0.05);border:1px solid var(--border);padding:10px;cursor:pointer;border-radius:3px}
.typing-indicator{display:flex;gap:4px;padding:12px 14px;background:rgba(0,255,65,0.05);border-radius:4px;width:fit-content}
.typing-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:typing 1.2s infinite}
@keyframes typing{0%,100%{opacity:0.3;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}
</style>
</head>
<body>
<header>
  <div class="logo-box">⚙</div>
  <div>
    <div class="header-title">CMM ASSISTANT</div>
    <div class="header-sub">GD&T · METROLOGÍA · TRIGONOMETRÍA</div>
  </div>
  <div class="status-dot"></div>
</header>
<div class="topics">
  <button class="topic-btn active" onclick="setTopic(this,'general')">GENERAL</button>
  <button class="topic-btn" onclick="setTopic(this,'gdt')">GD&T / ASME Y14.5</button>
  <button class="topic-btn" onclick="setTopic(this,'cmm')">CMM / MEDICIÓN</button>
  <button class="topic-btn" onclick="setTopic(this,'trig')">TRIGONOMETRÍA</button>
  <button class="topic-btn" onclick="setTopic(this,'tolerancias')">TOLERANCIAS</button>
  <button class="topic-btn" onclick="setTopic(this,'calidad')">CALIDAD / PPAP</button>
</div>
<div id="chat-area">
  <div class="msg bot">
    <div class="msg-avatar">⚙</div>
    <div class="msg-content">
      <div class="msg-label">CMM ASSISTANT · SISTEMA ONLINE</div>
      <div class="msg-bubble welcome-box">
        <div style="color:var(--green);margin-bottom:10px">> INSTRUCTOR TÉCNICO INICIALIZADO</div>
        <div style="font-size:13px;color:var(--text2)">Especialista en manufactura y metrología. Selecciona un tema o pregunta directamente.</div>
        <div class="welcome-grid">
          <div class="welcome-item" onclick="sendQuick('¿Qué es GD&T y para qué sirve?')">
            <div style="font-size:11px;color:var(--green)">GD&T BÁSICO</div>
          </div>
          <div class="welcome-item" onclick="sendQuick('¿Cómo se programa una CMM?')">
            <div style="font-size:11px;color:var(--green)">PROGRAMACIÓN CMM</div>
          </div>
          <div class="welcome-item" onclick="sendQuick('Explícame la Ley de Senos y Cosenos')">
            <div style="font-size:11px;color:var(--green)">TRIGONOMETRÍA</div>
          </div>
          <div class="welcome-item" onclick="sendQuick('¿Qué es un PPAP?')">
            <div style="font-size:11px;color:var(--green)">CALIDAD / PPAP</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="input-area">
  <div class="input-row">
    <textarea id="msg-input" placeholder="Escribe tu pregunta técnica..." rows="1" onkeydown="handleKey(event)"></textarea>
    <button id="send-btn" onclick="sendMsg()">➤</button>
  </div>
</div>
<script>
// --- CONFIGURACIÓN DEL WORKER ---
const WORKER_URL = 'https://metro-proxy.nunezalfonso313.workers.dev';

let currentTopic='general',isLoading=false;

const TOPICS={
  general:'Eres un instructor técnico especializado en GD&T (ASME Y14.5), metrología CMM y trigonometría aplicada a manufactura. Responde en español de forma técnica y precisa.',
  gdt:'Eres un experto en GD&T según ASME Y14.5. Explica símbolos, tolerancias geométricas, datum, MMC, LMC. Responde en español.',
  cmm:'Eres programador experto de CMM. Explica medición, programación, calificación de puntas. Responde en español.',
  trig:'Eres instructor de trigonometría aplicada a manufactura. Explica leyes de senos y cosenos, ángulos, coordenadas. Responde en español.',
  tolerancias:'Eres experto en tolerancias dimensionales según ISO y ASME. Responde en español.',
  calidad:'Eres experto en PPAP, APQP, FMEA, MSA e IATF 16949. Responde en español.',
};

function setTopic(btn,topic){
  document.querySelectorAll('.topic-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentTopic=topic;
}

function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}

function addMsg(role,text){
  const area=document.getElementById('chat-area');
  const div=document.createElement('div');
  div.className='msg '+role;
  div.innerHTML=`<div class="msg-avatar">${role==='bot'?'⚙':'👤'}</div><div class="msg-content"><div class="msg-label">${role==='bot'?'CMM ASSISTANT':'OPERADOR'}</div><div class="msg-bubble">${text.replace(/\n/g,'<br>')}</div></div>`;
  area.appendChild(div);
  area.scrollTop=area.scrollHeight;
}

function showTyping(){
  const area=document.getElementById('chat-area');
  const div=document.createElement('div');
  div.className='msg bot';div.id='typing';
  div.innerHTML='<div class="msg-avatar">⚙</div><div class="msg-content"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
  area.appendChild(div);area.scrollTop=area.scrollHeight;
}

async function sendMsg(){
  const input=document.getElementById('msg-input');
  const text=input.value.trim();
  if(!text||isLoading)return;
  input.value='';
  sendQuick(text);
}

async function sendQuick(text){
  if(isLoading)return;
  isLoading=true;
  document.getElementById('send-btn').disabled=true;
  addMsg('user',text);
  showTyping();
  try{
    const r=await fetch(WORKER_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',
        messages:[{role:'system',content:TOPICS[currentTopic]},{role:'user',content:text}]
      })
    });
    const data=await r.json();
    document.getElementById('typing').remove();
    addMsg('bot',data.choices[0].message.content);
  }catch(e){
    if(document.getElementById('typing')) document.getElementById('typing').remove();
    addMsg('bot','Error de conexión: '+e.message);
  }
  isLoading=false;
  document.getElementById('send-btn').disabled=false;
}
</script>
</body>
</html>
